name: secret-scan
on:
  push:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Working-tree only (--no-git): mastra is a 23k-commit upstream fork.
      # No artifact upload: Forgejo's runner rejects upload-artifact@v4 (GHES).
      # gitleaks --verbose --redact prints findings (redacted) to the job log;
      # --exit-code 1 fails the job on any leak, which is the alert signal.
      - name: Scan full history
        run: gitleaks detect --source . --no-git --redact --verbose --exit-code 1
